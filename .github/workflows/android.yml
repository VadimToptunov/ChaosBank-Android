name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (standard flavor)
        run: ./gradlew :app:testStandardDebugUnitTest --stacktrace

      - name: Coverage gate (JaCoCo, logic layer ≥ 90%)
        run: ./gradlew :app:jacocoCoverageVerification --stacktrace

      - name: Coverage report
        run: ./gradlew :app:jacocoTestReport --stacktrace

      - name: Assemble standard debug APK
        run: ./gradlew :app:assembleStandardDebug --stacktrace

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: app/build/reports/jacoco/jacocoTestReport/html
